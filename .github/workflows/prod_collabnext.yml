name: Build and Deploy to Azure

on:
  push:
    branches:
      - prod  # Trigger on pushes to the main branch
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: collabnext       # Replace with your Azure WebApp name
  AZURE_RG: collabnext_alpha          # Replace with your Azure Resource Group name
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.10'
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend
  FRONTEND_BUILD_DIR: build
  BACKEND_BUILD_DIR: collabnextapp/build

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Set up Python for backend
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. Install backend dependencies
      - name: Install Backend Dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Verify backend setup
      - name: Verify Backend Setup
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          source .venv/bin/activate
          pip list
          ls -la

      # 5. Set up Node.js for frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 6. Install frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm install --legacy-peer-deps

      # 7. Build the frontend
      - name: Build Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm run build

      # 8. Verify frontend build
      - name: Verify Frontend Build
        run: |
          ls -la ${{ env.FRONTEND_DIR }}/${{ env.FRONTEND_BUILD_DIR }}

      # 9. Copy frontend build to backend
      - name: Copy Frontend Build to Backend
        run: |
          mkdir -p ${{ env.BACKEND_DIR }}/${{ env.BACKEND_BUILD_DIR }}
          cp -r ${{ env.FRONTEND_DIR }}/${{ env.FRONTEND_BUILD_DIR }}/* ${{ env.BACKEND_DIR }}/${{ env.BACKEND_BUILD_DIR }}/

      # 10. Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 11. Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.BACKEND_DIR }}

      # 12. Azure Logout
      - name: Azure Logout
        run: az logout